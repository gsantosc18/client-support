version: '3.8'

services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: client_support
    ports:
      - "3306:3306"
    volumes:
      - mariadbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=root:rootpassword@tcp(db:3306)/client_support?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_URL=redis:6379
      - LOCAL_STORAGE_PATH=/app/storage
      - USE_S3=false
      - COMPANY_ID=11111111-1111-1111-1111-111111111111
      - REGISTRATION_ACCESS_CODE=test-passcode
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://localhost:8080/api
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  mariadbdata:
  redisdata:
