name: Build and Push Docker Images

on:
  release:
    types: [published]

jobs:
  build-backend:
    name: Build & Push Backend
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to private registry
        uses: docker/login-action@v2
        with:
          registry: registry.advocase.site
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            registry.advocase.site/client-support/backend:${{ github.event.release.tag_name }}
            registry.advocase.site/client-support/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Log in to private registry
        uses: docker/login-action@v2
        with:
          registry: registry.advocase.site
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          build-args: |
            BACKEND_URL=${{ secrets.BACKEND_URL || 'https://api.advocase.site/api' }}
          tags: |
            registry.advocase.site/client-support/app:${{ github.event.release.tag_name }}
            registry.advocase.site/client-support/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
